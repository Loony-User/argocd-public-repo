apiVersion: batch/v1
kind: Job
metadata:
  name: presync-check
  namespace: default
  annotations:
    argocd.argoproj.io/hook: PreSync
spec:
  template:
    spec:
      containers:
      - name: pre-check
        image: busybox
        command:
        - sh
        - -c
        - |
          echo "PreSync Hook: Running pre-deployment checks..."
          echo "Checking environment is ready..."
          sleep 3
          echo "Pre-check passed! Safe to deploy."
      restartPolicy: Never
  backoffLimit: 1